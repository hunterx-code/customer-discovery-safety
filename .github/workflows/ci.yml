name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: PYTHONDONTWRITEBYTECODE=1 python -B -m unittest discover -s tests

      - name: Run public-safety scan
        run: python customer-discovery-safety/scripts/scan_public_safety.py README.md CHANGELOG.md assets docs examples marketing customer-discovery-safety tests .github
