<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Customer Discovery Safety demo</title>
  <desc id="desc">A before and after showing messy discovery notes, an unsafe interpretation, and an approval-gated safe output.</desc>
  <rect width="1100" height="620" fill="#f7f8fb"/>
  <rect x="40" y="36" width="1020" height="548" rx="14" fill="#ffffff" stroke="#d8dee9"/>
  <text x="70" y="84" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#111827">Approval-gated customer discovery for AI agents</text>
  <text x="70" y="120" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#4b5563">Separate weak signals from real demand before emails, DMs, forms, posts, uploads, or publishing.</text>

  <rect x="70" y="160" width="300" height="330" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="92" y="198" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#9a3412">Messy notes</text>
  <text x="92" y="238" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">Month-end dashboard cleanup</text>
  <text x="92" y="264" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">takes too long.</text>
  <text x="92" y="304" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">SOC 2 question, but no</text>
  <text x="92" y="330" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">current pain described.</text>
  <text x="92" y="370" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">Community comment:</text>
  <text x="92" y="396" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">"I would try this."</text>
  <text x="92" y="444" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">No budget owner, weekly use,</text>
  <text x="92" y="470" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7c2d12">or approved message.</text>

  <path d="M398 316H492" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
  <path d="M480 300L496 316L480 332" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="520" y="160" width="230" height="330" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="542" y="198" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#991b1b">Unsafe jump</text>
  <text x="542" y="244" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7f1d1d">"People want this."</text>
  <text x="542" y="292" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7f1d1d">Send buyer pitch.</text>
  <text x="542" y="340" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7f1d1d">Post in community.</text>
  <text x="542" y="388" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#7f1d1d">Start pilot thread.</text>

  <path d="M778 316H832" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
  <path d="M820 300L836 316L820 332" fill="none" stroke="#9ca3af" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="860" y="160" width="170" height="330" rx="10" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="882" y="198" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#166534">Safe output</text>
  <text x="882" y="238" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Demand not validated.</text>
  <text x="882" y="286" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Route evidence only.</text>
  <text x="882" y="334" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Draft no-send packet.</text>
  <text x="882" y="382" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">Block external action</text>
  <text x="882" y="408" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#14532d">until exact approval.</text>

  <rect x="70" y="520" width="960" height="34" rx="17" fill="#eef2ff"/>
  <text x="92" y="542" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#3730a3">Instruction-level workflow. Not a sandbox, compliance system, security control, or guaranteed prevention mechanism.</text>
</svg>
